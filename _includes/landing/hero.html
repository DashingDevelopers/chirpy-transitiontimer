{% assign hero = site.data.landing.hero %}
{% assign badges = site.data.landing.store_badges %}

<div class="tt-hero">
  <h1>
    {{ hero.headline1 }}<br>
    <span class="accent">{{ hero.headline2 }}</span>
  </h1>
  <p>{{ hero.subtext }}</p>

  <div class="store-badges">
    {% for badge in badges %}
    <a href="{{ badge.url }}" target="_blank" rel="noopener">
      <img src="{{ badge.img }}" alt="{{ badge.alt }}">
    </a>
    {% endfor %}
  </div>

  <div class="screenshots">
    {% for shot in hero.screenshots %}
    <img src="{{ shot.src }}" alt="{{ shot.alt }}" class="tt-screenshot">
    {% endfor %}
  </div>
</div>
